services:
  web:
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - CACHE_DATABASE_URL=${CACHE_DATABASE_URL}
      - QUEUE_DATABASE_URL=${QUEUE_DATABASE_URL}
      - CABLE_DATABASE_URL=${CABLE_DATABASE_URL}
      - RAILS_MASTER_KEY=${RAILS_MASTER_KEY}
    build:
      context: .
      args:
        UID: ${UID:-1000}
        GID: ${GID:-${UID:-1000}}
    volumes:
      - ./log:/rails/log
      - ./storage:/rails/storage
    ports:
      - "3001:3000"
